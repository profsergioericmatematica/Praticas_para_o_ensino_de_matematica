                "A. Formar especialistas em cálculos estatísticos avançados.",
                "B. Ensinar apenas a construção técnica de gráficos e tabelas.",
                "C. Substituir outros conteúdos da Matemática.",
                "D. Promover a formação cidadã e a leitura crítica das informações baseadas em dados.",
                "E. Preparar alunos apenas para vestibulares e concursos."
            ],
            correta: "D",
            explicacao: "O letramento estatístico visa a cidadania crítica, não o tecnicismo."
        },
        {
            id: 20,
            semana: 7,
            texto: "Em um gráfico de colunas, para evitar distorções visuais (como eixo truncado), o eixo vertical deve:",
            alternativas: [
                "A. começar em qualquer número para economizar espaço.",
                "B. começar obrigatoriamente no zero.",
                "C. começar no maior valor da pesquisa.",
                "D. não apresentar escala numérica.",
                "E. apresentar apenas os valores escritos nas colunas."
            ],
            correta: "B",
            explicacao: "Gráficos de colunas/barras devem ter eixo vertical iniciado em zero para manter a proporção real dos dados."
        }
    ];


    // ===================== LÓGICA DE NAVEGAÇÃO =====================
    let indexAtual = 0;
    const container = document.getElementById('questoes-container');
    const btnAnterior = document.getElementById('btn-anterior');
    const btnProximo = document.getElementById('btn-proximo');
    const contadorSpan = document.getElementById('contador');

    // Armazenar respostas do usuário (por id da questão, guarda a letra selecionada e se já respondeu)
    let respostasUsuario = {};

    function renderizarQuestao() {
        const q = questoes[indexAtual];
        if (!q) return;

        // Verifica se já foi respondida para pré-selecionar
        const respostaSalva = respostasUsuario[q.id];
        const letraSelecionada = respostaSalva ? respostaSalva.letra : null;

        let html = `
            <div class="question-card">
                <div class="question-header">
                    <span>📌 Questão ${indexAtual+1}</span>
                    <span class="semana-badge">Semana ${q.semana}</span>
                </div>
                <div class="question-body">
                    <div class="question-text">${q.texto}</div>
                    <div class="alternativas" id="alternativas-${q.id}">
        `;

        q.alternativas.forEach((alt, idx) => {
            const letra = String.fromCharCode(65 + idx); // A, B, C, D, E
            const checkedAttr = (letraSelecionada === letra) ? 'checked' : '';
            html += `
                <div class="alternativa" data-letra="${letra}" data-id="${q.id}">
                    <input type="radio" name="questao-${q.id}" value="${letra}" id="alt-${q.id}-${letra}" ${checkedAttr}>
                    <label for="alt-${q.id}-${letra}">${alt}</label>
                </div>
            `;
        });

        // Se já respondeu, mostrar feedback
        let feedbackHtml = '';
        if (respostaSalva && respostaSalva.acertou !== undefined) {
            const acertou = respostaSalva.acertou;
            feedbackHtml = `
                <div class="feedback ${acertou ? 'correct' : 'incorrect'}" style="display: block;">
                    ${acertou ? '✅ Correto!' : '❌ Incorreto!'}
                    <div class="explicacao">📖 ${q.explicacao}</div>
                </div>
            `;
        }

        html += `
                    </div>
                    <button class="btn-responder" data-id="${q.id}">✓ Verificar resposta</button>
                    ${feedbackHtml}
                </div>
            </div>
        `;

        container.innerHTML = html;

        // Adicionar eventos aos radio buttons para destacar a alternativa selecionada
        document.querySelectorAll(`.alternativa[data-id="${q.id}"]`).forEach(altDiv => {
            const radio = altDiv.querySelector('input[type="radio"]');
            radio.addEventListener('change', () => {
                // Remove classe selected de todas alternativas desta questão
                document.querySelectorAll(`.alternativa[data-id="${q.id}"]`).forEach(div => {
                    div.classList.remove('selected');
                });
                if (radio.checked) {
                    altDiv.classList.add('selected');
                }
            });
            // Se já estava marcado, adiciona classe selected
            if (radio.checked) {
                altDiv.classList.add('selected');
            }
        });

        // Evento do botão verificar
        const btnResponder = document.querySelector(`.btn-responder[data-id="${q.id}"]`);
        btnResponder.addEventListener('click', () => verificarResposta(q.id));
    }

    function verificarResposta(questaoId) {
        const q = questoes.find(q => q.id === questaoId);
        if (!q) return;

        const radioSelecionado = document.querySelector(`input[name="questao-${q.id}"]:checked`);
        if (!radioSelecionado) {
            alert("Selecione uma alternativa antes de verificar.");
            return;
        }

        const letraSelecionada = radioSelecionado.value;
        const acertou = (letraSelecionada === q.correta);

        // Salvar resposta
        respostasUsuario[q.id] = {
            letra: letraSelecionada,
            acertou: acertou
        };

        // Re-renderizar a questão atual para mostrar o feedback
        renderizarQuestao();
    }

    function atualizarContador() {
        contadorSpan.textContent = `Questão ${indexAtual+1} de ${questoes.length}`;
    }

    function irParaProximo() {
        if (indexAtual < questoes.length - 1) {
            indexAtual++;
            renderizarQuestao();
            atualizarContador();
        }
    }

    function irParaAnterior() {
        if (indexAtual > 0) {
            indexAtual--;
            renderizarQuestao();
            atualizarContador();
        }
    }

    btnProximo.addEventListener('click', irParaProximo);
    btnAnterior.addEventListener('click', irParaAnterior);

    // Inicializar
    renderizarQuestao();
    atualizarContador();
</script>
</body>
</html>
